---
specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Hanko
providerId: hanko
created: '2026-06-12'
modified: '2026-06-12'
reconciled: true
tags:
  - Authentication
  - Passkeys
  - Identity
  - SaaS
description: >-
  Hanko offers a free Starter tier supporting up to 10,000 monthly active users
  across 2 projects, a Pro plan at $29/month with overage pricing, and
  Enterprise with custom pricing. A special Startup plan provides 1 million free
  MAUs for qualifying early-stage startups. Monthly active users are defined as
  any user issued a session token at least once in a given calendar month.
sources:
  - https://www.hanko.io/pricing
  - https://www.hanko.io/blog/our-new-pricing
  - https://www.hanko.io/startup-plan
plans:
  - id: hanko-starter
    name: Starter
    type: free
    description: >-
      Free tier for developers and small projects. Includes 10,000 monthly
      active users, 2 production projects, passkeys, passwords, passwordless
      authentication, social SSO, MFA, custom domain, and admin dashboard.
      Supported by community channels.
    entries:
      - label: Monthly Active Users
        name: mau_limit
        type: quota
        metric: monthly_active_users
        limit: 10000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Production Projects
        name: project_limit
        type: quota
        metric: projects
        limit: 2
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Passkeys
        name: passkeys
        type: boolean
        metric: feature
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Social SSO
        name: social_sso
        type: boolean
        metric: feature
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: MFA
        name: mfa
        type: boolean
        metric: feature
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false

  - id: hanko-pro
    name: Pro
    type: paid
    description: >-
      Paid plan at $29/month base price including 10,000 MAUs, with $0.01 per
      additional MAU beyond that. Supports up to 5 projects. Adds personal
      support via email and Slack, team member invites, webhooks, Admin API,
      custom SMTP, and SAML SSO (available as an add-on at $49/month per
      connection). Includes all Starter features.
    entries:
      - label: Base Price
        name: base_price
        type: metered
        metric: flat_monthly
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '29.00'
        userMultiplied: false
      - label: Included Monthly Active Users
        name: included_mau
        type: quota
        metric: monthly_active_users
        limit: 10000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Overage Monthly Active Users
        name: overage_mau
        type: metered
        metric: monthly_active_users
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.01'
        userMultiplied: true
      - label: Production Projects
        name: project_limit
        type: quota
        metric: projects
        limit: 5
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Webhooks
        name: webhooks
        type: boolean
        metric: feature
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Admin API
        name: admin_api
        type: boolean
        metric: feature
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: SAML SSO (per connection add-on)
        name: saml_sso_addon
        type: metered
        metric: saml_connections
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '49.00'
        userMultiplied: false

  - id: hanko-enterprise
    name: Enterprise
    type: enterprise
    description: >-
      Custom-priced enterprise plan with unlimited projects, 99.99% uptime SLA,
      priority support, admin dashboard SSO, extended audit log retention,
      commercial license option, private cloud deployment, and custom features.
      Pricing available on request.
    entries:
      - label: Monthly Active Users
        name: mau_limit
        type: quota
        metric: monthly_active_users
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: 'custom'
        userMultiplied: false
      - label: Production Projects
        name: project_limit
        type: quota
        metric: projects
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: 'custom'
        userMultiplied: false
      - label: Uptime SLA
        name: uptime_sla
        type: boolean
        metric: feature
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: 'custom'
        userMultiplied: false
      - label: Private Cloud Deployment
        name: private_cloud
        type: boolean
        metric: feature
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: 'custom'
        userMultiplied: false

  - id: hanko-startup
    name: Startup Plan
    type: freemium
    description: >-
      Special program for qualifying early-stage startups providing 1 million
      free monthly active users for life (or until the startup exceeds $500k
      ARR or $1M in VC funding). Available to startups on the Free or Pro tier
      by application.
    entries:
      - label: Monthly Active Users
        name: mau_limit
        type: quota
        metric: monthly_active_users
        limit: 1000000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
