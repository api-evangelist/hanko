---
aid: hanko
name: Hanko
description: >-
  Hanko is a passkey-first, open-source authentication platform that serves as
  a modern alternative to Auth0, Clerk, and WorkOS. It provides a REST API
  covering passkeys (WebAuthn/FIDO2), passwords, OAuth social login, SAML SSO,
  multi-factor authentication, and session management. Hanko is available as a
  managed cloud service and as a self-hosted open-source deployment, targeting
  developers who want to add passwordless authentication to their applications.
  The platform is headquartered in Germany and emphasizes privacy-first,
  European-hosted infrastructure with a free tier supporting up to 10,000
  monthly active users.
type: Index
