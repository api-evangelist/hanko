apis:
  - aid: hanko:public-api
    name: Hanko Public API
    description: >-
      The Hanko Public API provides the frontend-facing authentication endpoints
      including WebAuthn/passkey registration and login, password authentication,
      OAuth third-party login, SAML SSO flows, session validation, user
      management, email management, and well-known configuration endpoints.
      The base URL uses a per-tenant subdomain pattern.
    humanURL: https://docs.hanko.io
    baseURL: https://{tenant_id}.hanko.io
    tags:
      - Authentication
      - Passkeys
      - WebAuthn
      - OAuth
      - SAML
      - Sessions
      - Users
    properties:
      - type: Documentation
        url: https://docs.hanko.io
      - type: OpenAPI
        url: https://docs.hanko.io/openapi-public.yaml
      - type: OpenAPI
        url: openapi/hanko-public-api-openapi.yml

  - aid: hanko:admin-api
    name: Hanko Admin API
    description: >-
      The Hanko Admin API provides backend management capabilities including
      user CRUD operations, session management, email management, WebAuthn
      credential management, audit log access, webhook configuration, OTP
      management, password management, and Prometheus metrics. This API
      requires a secret API key and should never be called from client-side code.
    humanURL: https://docs.hanko.io
    baseURL: https://{tenant_id}.hanko.io
    tags:
      - Administration
      - Users
      - Sessions
      - Audit Logs
      - Webhooks
    properties:
      - type: Documentation
        url: https://docs.hanko.io
      - type: OpenAPI
        url: https://docs.hanko.io/openapi-admin.yaml
      - type: OpenAPI
        url: openapi/hanko-admin-api-openapi.yml

  - aid: hanko:passkey-api
    name: Hanko Passkey API
    description: >-
      The Hanko Passkey API is a standalone FIDO2-certified passkey server
      designed to add passkey support to any existing authentication system.
      It covers WebAuthn credential registration and management, passkey login
      flows, MFA operations, transaction verification, audit log retrieval,
      and JWKS endpoints. It uses a secret API key for backend authentication.
    humanURL: https://docs.hanko.io/passkey-api/introduction
    baseURL: https://passkeys.hanko.io
    tags:
      - Passkeys
      - WebAuthn
      - FIDO2
      - MFA
      - Credentials
    properties:
      - type: Documentation
        url: https://docs.hanko.io/passkey-api/introduction
      - type: OpenAPI
        url: https://docs.hanko.io/openapi-passkeys.yaml
      - type: OpenAPI
        url: openapi/hanko-passkey-api-openapi.yml

  - aid: hanko:flow-api
    name: Hanko Flow API
    description: >-
      The Hanko Flow API powers structured authentication flows including
      login initialization and advancement, registration flow management,
      profile flow handling, and token exchange operations. It underpins
      the Hanko Elements UI components and supports stateful multi-step
      authentication journeys.
    humanURL: https://docs.hanko.io
    baseURL: https://{tenant_id}.hanko.io
    tags:
